name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/server.js
          node --check src/hermes-bridge.js
          node --check src/pod-manager.js
          node --check src/business-store.js
          node --check src/agent-orchestrator.js
          node --check sdk/pod.js
          node --check bin/openclaw.js

      - name: Run tests
        run: npm test
